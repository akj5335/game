server {
    listen 80;
    server_name neonplay.com www.neonplay.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name neonplay.com www.neonplay.com;

    # SSL Configuration (Let's Encrypt managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/neonplay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neonplay.com/privkey.pem;

    # Frontend (React Build)
    location / {
        root /var/www/neonplay/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Caching statics
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public, max-age=15552000, immutable";
        }
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP Forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
